<aside class="sidebar" style="width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;padding:0">

  <!-- Brand -->
  <a href="/" style="display:flex;align-items:center;gap:10px;padding:1.4rem 1.25rem 1rem;font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);text-decoration:none">
    <div style="width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <span class="mi" style="font-size:16px;color:#fff">local_drink</span>
    </div>
    PolyCoffee
  </a>

  <!-- Overview -->
  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase">Overview</div>
  <a href="/components/customer/dashboard-customer.html" class="sb-link" data-page="dashboard">
    <span class="mi">dashboard</span> Dashboard
  </a>

  <!-- Shop -->
  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:.5rem">Shop</div>
  <a href="/components/customer/products-customer.html" class="sb-link" data-page="products">
    <span class="mi">inventory_2</span> Menu
  </a>
  <a href="/components/customer/voucher-customer.html" class="sb-link" data-page="voucher">
    <span class="mi">local_offer</span> Vouchers
  </a>
  <a href="/components/customer/orders-customer.html" class="sb-link" data-page="orders">
    <span class="mi">receipt_long</span> Orders
  </a>
  <a href="/components/customer/delivery-customer.html" class="sb-link" data-page="delivery">
    <span class="mi">delivery_dining</span> Delivery
  </a>

  <!-- Account -->
  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:.5rem">Account</div>
  <a href="/components/customer/user-customer.html" class="sb-link" data-page="profile">
    <span class="mi">manage_accounts</span> My Profile
  </a>
  <a href="/components/customer/setting-customer.html" class="sb-link" data-page="settings">
    <span class="mi">settings</span> Settings
  </a>

  <!-- Bottom: user info + sign out -->
  <div style="margin-top:auto;padding:1rem;border-top:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div id="sb-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0">—</div>
      <div style="flex:1;min-width:0">
        <div id="sb-name" style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
        <div id="sb-role" style="font-size:11px;color:var(--text-light);text-transform:capitalize">customer</div>
      </div>
    </div>
    <button onclick="sbLogout()" style="display:flex;align-items:center;gap:6px;width:100%;padding:.6rem .75rem;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-mid);font-size:12px;font-family:var(--sans);cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='#e05252';this.style.color='#e05252'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-mid)'">
      <span class="mi" style="font-size:15px">logout</span> Sign out
    </button>
  </div>

</aside>

<style>
.sb-link {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 1.25rem;
  font-size: 13px;
  color: var(--text-mid);
  text-decoration: none;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--sans);
}
.sb-link:hover { background: var(--bg2); color: var(--text); }
.sb-link.active { background: var(--green-light); color: var(--green-dark); font-weight: 500; }
.sb-link .mi { font-size: 17px; }
</style>

<script>
// Highlight active link based on current page filename
(function(){
  const path = window.location.pathname;
  document.querySelectorAll('.sb-link').forEach(a => {
    if (path.includes(a.getAttribute('href').split('/').pop())) {
      a.classList.add('active');
    }
  });

  // Populate session info
  const s = JSON.parse(localStorage.getItem('fm_session') || 'null');
  if (s) {
    const av = document.getElementById('sb-avatar');
    const nm = document.getElementById('sb-name');
    const rl = document.getElementById('sb-role');
    if (av) { av.textContent = s.name.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase(); }
    if (nm) nm.textContent = s.name;
    if (rl) rl.textContent = s.role || 'customer';
  }
})();

function sbLogout() {
  if (confirm('Sign out of PolyCoffee?')) {
    localStorage.removeItem('fm_session');
    window.location.href = '/';
  }
}
</script>
