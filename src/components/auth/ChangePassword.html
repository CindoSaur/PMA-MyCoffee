<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Change Password - MyCoffee</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
	<style>
		:root{--bg:#f6f8f7;--card:#fff;--text:#14261f;--muted:#5d6b64;--green:#2f7d58;--border:#d7e1dc;--radius:12px;--sans:'DM Sans',sans-serif;--serif:'Playfair Display',serif}
		*{box-sizing:border-box}
		body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text)}
		.wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
		.card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;box-shadow:0 12px 30px rgba(16,38,28,.08)}
		.title{font-family:var(--serif);font-size:28px;margin:0 0 6px}
		.sub{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.6}
		.group{margin-bottom:12px}
		.label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
		.input{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font:inherit;outline:none}
		.input:focus{border-color:var(--green)}
		.hint{margin:2px 0 0;color:#2563eb;font-size:12px}
		.btn{width:100%;margin-top:6px;padding:11px 14px;border:none;border-radius:10px;background:var(--green);color:#fff;font:600 14px var(--sans);cursor:pointer}
		.link{margin-top:12px;background:none;border:none;padding:0;color:var(--muted);text-decoration:underline;cursor:pointer;font:500 13px var(--sans)}
		.toast{position:fixed;right:18px;bottom:18px;background:#1f2937;color:#fff;padding:10px 12px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s}
		.toast.show{opacity:1}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<h1 class="title">Change Password</h1>
			<p class="sub">Enter OTP and your new password. For demo, OTP is always <strong>123456</strong>.</p>

			<div class="group">
				<label class="label" for="cp-email">Email</label>
				<input class="input" id="cp-email" type="email" placeholder="you@example.com" />
			</div>

			<div class="group">
				<label class="label" for="cp-otp">OTP</label>
				<input class="input" id="cp-otp" type="text" placeholder="123456" />
				<p class="hint">Demo OTP mặc định: 123456</p>
			</div>

			<div class="group">
				<label class="label" for="cp-pw">New password</label>
				<input class="input" id="cp-pw" type="password" placeholder="Minimum 8 characters" />
			</div>

			<div class="group">
				<label class="label" for="cp-pw2">Confirm new password</label>
				<input class="input" id="cp-pw2" type="password" placeholder="Re-enter password" />
			</div>

			<button class="btn" onclick="changePassword()">Update Password</button>
			<button class="link" onclick="window.location.href='login.html'">Back to Login</button>
		</div>
	</div>

	<div id="toast" class="toast"></div>

	<script src="/js/auth.js"></script>
	<script>
		let tmr;
		function showPageToast(msg){
			const t = document.getElementById('toast');
			t.textContent = msg;
			t.classList.add('show');
			clearTimeout(tmr);
			tmr = setTimeout(()=>t.classList.remove('show'), 2600);
		}

		function changePassword(){
			const email = document.getElementById('cp-email').value.trim().toLowerCase();
			const otp = document.getElementById('cp-otp').value.trim();
			const pw = document.getElementById('cp-pw').value;
			const pw2 = document.getElementById('cp-pw2').value;

			if(pw !== pw2){ showPageToast('Confirm password does not match'); return; }
			const rs = resetPasswordWithOtpDemo(email, otp, pw);
			if(!rs.ok){ showPageToast(rs.message); return; }
			showPageToast('Password changed successfully');
			setTimeout(()=>window.location.href='login.html', 700);
		}

		window.addEventListener('DOMContentLoaded', () => {
			const email = getResetEmail();
			if(email) document.getElementById('cp-email').value = email;
			document.getElementById('cp-otp').value = '123456';
		});
	</script>
</body>
</html>
