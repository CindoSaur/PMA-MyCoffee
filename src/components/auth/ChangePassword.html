<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Change Password - Fresh Market</title>
	<link rel="stylesheet" href="/style/style.css" />
	<style>
		.wrap { min-height:100vh; display:grid; place-items:center; background:var(--bg); padding:1rem; }
		.card { width:100%; max-width:500px; background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; }
		.title { font-family:var(--serif); font-size:1.5rem; margin-bottom:.35rem; }
		.sub { color:var(--text-mid); font-size:13px; margin-bottom:1rem; }
		.fg { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
		.lbl { font-size:12px; color:var(--text-mid); font-weight:500; }
		.input { padding:11px 13px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; font-family:var(--sans); }
		.input:focus { outline:none; border-color:var(--green); }
		.btn { width:100%; border:none; border-radius:var(--radius-sm); padding:11px 14px; background:var(--green); color:#fff; font-weight:500; cursor:pointer; }
		.btn:hover { background:var(--green-dark); }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<div class="title">Set a new password</div>
			<div class="sub">Enter the reset code and your new password.</div>

			<div class="fg">
				<label class="lbl">Email</label>
				<input id="email" class="input" type="email" placeholder="you@example.com" />
			</div>
			<div class="fg">
				<label class="lbl">Reset code</label>
				<input id="code" class="input" type="text" placeholder="6-digit code" />
			</div>
			<div class="fg">
				<label class="lbl">New password</label>
				<input id="pw" class="input" type="password" placeholder="Minimum 8 characters" />
			</div>
			<div class="fg">
				<label class="lbl">Confirm new password</label>
				<input id="pw2" class="input" type="password" placeholder="Re-enter new password" />
			</div>

			<button class="btn" onclick="submitChange()">Update Password</button>
		</div>
	</div>

	<script src="/js/auth.js"></script>
	<script>
		function prefillFromQuery() {
			const q = new URLSearchParams(window.location.search);
			const email = q.get('email') || '';
			const code = q.get('code') || '';
			if (email) document.getElementById('email').value = email;
			if (code) document.getElementById('code').value = code;
		}

		function submitChange() {
			const email = document.getElementById('email').value.trim().toLowerCase();
			const code = document.getElementById('code').value.trim();
			const pw = document.getElementById('pw').value;
			const pw2 = document.getElementById('pw2').value;

			if (!email || !email.includes('@')) { showToast('Please enter a valid email'); return; }
			if (!code) { showToast('Please enter reset code'); return; }
			if (pw.length < 8) { showToast('Password must be at least 8 characters'); return; }
			if (pw !== pw2) { showToast('Passwords do not match'); return; }

			const result = completePasswordReset(email, code, pw);
			if (!result.ok) {
				showToast(result.message || 'Unable to reset password');
				return;
			}

			showToast('Password updated successfully');
			setTimeout(() => {
				window.location.href = '/components/auth/login.html';
			}, 1200);
		}

		window.addEventListener('DOMContentLoaded', prefillFromQuery);
	</script>
</body>
</html>
