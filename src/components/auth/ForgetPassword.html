<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Forgot Password - Fresh Market</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
	<style>
		:root{--bg:#f6f8f7;--card:#fff;--text:#14261f;--muted:#5d6b64;--green:#2f7d58;--border:#d7e1dc;--radius:12px;--sans:'DM Sans',sans-serif;--serif:'Playfair Display',serif}
		*{box-sizing:border-box}
		body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text)}
		.wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
		.card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;box-shadow:0 12px 30px rgba(16,38,28,.08)}
		.title{font-family:var(--serif);font-size:28px;margin:0 0 6px}
		.sub{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.6}
		.label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
		.input{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font:inherit;outline:none}
		.input:focus{border-color:var(--green)}
		.hint{margin:10px 0 0;color:#2563eb;font-size:13px}
		.btn{width:100%;margin-top:14px;padding:11px 14px;border:none;border-radius:10px;background:var(--green);color:#fff;font:600 14px var(--sans);cursor:pointer}
		.row{margin-top:12px;display:flex;justify-content:space-between;gap:10px}
		.link{background:none;border:none;padding:0;color:var(--muted);text-decoration:underline;cursor:pointer;font:500 13px var(--sans)}
		.toast{position:fixed;right:18px;bottom:18px;background:#1f2937;color:#fff;padding:10px 12px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s}
		.toast.show{opacity:1}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<h1 class="title">Forgot Password</h1>
			<p class="sub">Demo static flow: enter your account email, then use OTP <strong>123456</strong> to reset your password.</p>

			<label class="label" for="fp-email">Email</label>
			<input class="input" id="fp-email" type="email" placeholder="you@example.com" />
			<p class="hint" id="otp-hint" style="display:none">Demo OTP: <strong>123456</strong></p>

			<button class="btn" onclick="sendOtpDemo()">Send OTP</button>

			<div class="row">
				<button class="link" onclick="window.location.href='login.html'">Back to Login</button>
				<button class="link" onclick="window.location.href='ChangePassword.html'">I already have OTP</button>
			</div>
		</div>
	</div>

	<div id="toast" class="toast"></div>

	<script src="/js/auth.js"></script>
	<script>
		let tmr;
		function showPageToast(msg){
			const t = document.getElementById('toast');
			t.textContent = msg;
			t.classList.add('show');
			clearTimeout(tmr);
			tmr = setTimeout(()=>t.classList.remove('show'), 2600);
		}

		function sendOtpDemo(){
			const email = document.getElementById('fp-email').value.trim().toLowerCase();
			if(!email || !email.includes('@')){ showPageToast('Please enter a valid email'); return; }
			const users = getUsers();
			const user = users.find(u => (u.email || '').toLowerCase() === email);
			if(!user){ showPageToast('Email does not exist'); return; }
			issueDemoOtp(email);
			document.getElementById('otp-hint').style.display = 'block';
			showPageToast('OTP sent (demo): 123456');
			setTimeout(()=>window.location.href='ChangePassword.html', 500);
		}
	</script>
</body>
</html>
