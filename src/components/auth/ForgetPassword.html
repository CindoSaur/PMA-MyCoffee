<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Forgot Password - Fresh Market</title>
	<link rel="stylesheet" href="/style/style.css" />
	<style>
		.wrap { min-height:100vh; display:grid; place-items:center; background:var(--bg); padding:1rem; }
		.card { width:100%; max-width:460px; background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; }
		.title { font-family:var(--serif); font-size:1.5rem; margin-bottom:.35rem; }
		.sub { color:var(--text-mid); font-size:13px; margin-bottom:1rem; }
		.fg { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
		.lbl { font-size:12px; color:var(--text-mid); font-weight:500; }
		.input { padding:11px 13px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; font-family:var(--sans); }
		.input:focus { outline:none; border-color:var(--green); }
		.btn { width:100%; border:none; border-radius:var(--radius-sm); padding:11px 14px; background:var(--green); color:#fff; font-weight:500; cursor:pointer; }
		.btn:hover { background:var(--green-dark); }
		.btn-secondary { margin-top:8px; width:100%; border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; background:#fff; color:var(--text-mid); cursor:pointer; }
		.help { margin-top:10px; font-size:12px; color:var(--text-light); line-height:1.5; }
		.note { margin-top:10px; padding:10px 12px; background:var(--green-light); color:var(--green-dark); border-radius:10px; font-size:12px; display:none; }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<div class="title">Forgot your password?</div>
			<div class="sub">Enter your account email to receive a reset code.</div>

			<div class="fg">
				<label class="lbl">Email address</label>
				<input id="email" class="input" type="email" placeholder="you@example.com" />
			</div>

			<button class="btn" onclick="requestCode()">Send Reset Code</button>
			<button class="btn-secondary" onclick="window.location.href='/components/auth/login.html'">Back to Sign In</button>

			<div class="note" id="note"></div>
			<div class="help">Demo mode: reset code is shown so you can continue in local-only mode.</div>
		</div>
	</div>

	<script src="/js/auth.js"></script>
	<script>
		function requestCode() {
			const email = document.getElementById('email').value.trim().toLowerCase();
			if (!email || !email.includes('@')) {
				showToast('Please enter a valid email');
				return;
			}

			const result = createPasswordResetRequest(email);
			if (!result.ok) {
				showToast(result.message || 'Unable to create reset request');
				return;
			}

			const note = document.getElementById('note');
			note.style.display = 'block';
			note.textContent = 'Reset code: ' + result.code + ' (valid for 10 minutes)';

			setTimeout(() => {
				window.location.href = '/components/auth/ChangePassword.html?email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(result.code);
			}, 1200);
		}
	</script>
</body>
</html>
