<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Customer</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    .page { display: flex; min-height: 100vh; background: var(--bg); }
    .main { flex: 1; min-width: 0; }
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .topbar h1 { margin: 0; font-family: var(--serif); font-size: 26px; color: var(--text); }
    .lang-switch {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--text);
    }
    .content { padding: 24px; max-width: 1120px; }

    .welcome {
      border-radius: var(--radius);
      padding: 20px;
      background: linear-gradient(135deg, #0f3f33, #1d9e75);
      color: #fff;
      margin-bottom: 18px;
    }
    .welcome h2 { margin: 0 0 6px; font-size: 24px; }
    .welcome p { margin: 0; color: rgba(255,255,255,.85); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .kpi {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .kpi .lbl { color: var(--text-light); font-size: 12px; }
    .kpi .val { color: var(--text); font-size: 28px; font-weight: 700; margin-top: 4px; }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    .chart-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .chart-title { margin: 0 0 10px; font-weight: 600; color: var(--text); }
    .canvas-wrap { position: relative; height: 320px; }
    canvas { width: 100%; height: 100%; display: block; }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .quick-links a {
      text-decoration: none;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-weight: 600;
      transition: .15s;
    }
    .quick-links a:hover { border-color: var(--green); color: var(--green-dark); }

    .empty {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px;
      color: var(--text-mid);
    }

    @media (max-width: 900px) {
      .chart-grid { grid-template-columns: 1fr; }
      .canvas-wrap { height: 260px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="sidebar-slot"></div>

    <main class="main">
      <div class="topbar">
        <h1 id="page-title">Customer Dashboard</h1>
        <select id="lang-select" class="lang-switch" aria-label="Language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>

      <div class="content">
        <section class="welcome">
          <h2 id="welcome-name">Welcome</h2>
          <p id="welcome-sub">Track how many drinks you bought with bar and pie charts.</p>
        </section>

        <section class="kpi-grid">
          <article class="kpi"><div class="lbl" id="kpi-lbl-orders">Total Orders</div><div class="val" id="kpi-orders">0</div></article>
          <article class="kpi"><div class="lbl" id="kpi-lbl-qty">Total Drinks</div><div class="val" id="kpi-qty">0</div></article>
          <article class="kpi"><div class="lbl" id="kpi-lbl-spent">Total Spent</div><div class="val" id="kpi-spent">0</div></article>
        </section>

        <section id="chart-section" class="chart-grid">
          <article class="chart-card">
            <h3 class="chart-title" id="bar-title">Bar Chart - Quantity by Drink</h3>
            <div class="canvas-wrap"><canvas id="barChart"></canvas></div>
          </article>
          <article class="chart-card">
            <h3 class="chart-title" id="pie-title">Pie Chart - Purchase Ratio</h3>
            <div class="canvas-wrap"><canvas id="pieChart"></canvas></div>
          </article>
        </section>

        <section id="empty-data" class="empty" style="display:none;">
          You have no purchased drink data yet. Place an order to see charts.
        </section>

        <section class="quick-links" style="margin-top:14px;">
          <a href="/components/customer/products-customer.html" id="ql-menu">Menu</a>
          <a href="/components/customer/voucher-customer.html" id="ql-vouchers">Vouchers</a>
          <a href="/components/customer/orders-customer.html" id="ql-others">Others</a>
          <a href="/components/customer/setting-customer.html" id="ql-profile">My Profile</a>
        </section>
      </div>
    </main>
  </div>

  <div id="footer-slot"></div>

  <script>
    const I18N = {
      en: {
        pageTitle: 'Customer Dashboard', welcome: 'Welcome',
        welcomeSub: 'Track how many drinks you bought with bar and pie charts.',
        totalOrders: 'Total Orders', totalDrinks: 'Total Drinks', totalSpent: 'Total Spent',
        barTitle: 'Bar Chart - Quantity by Drink', pieTitle: 'Pie Chart - Purchase Ratio',
        emptyData: 'You have no purchased drink data yet. Place an order to see charts.',
        menu: 'Menu', vouchers: 'Vouchers', others: 'Others', profile: 'My Profile',
        centerTotal: 'Total', currency: 'VND'
      },
      vi: {
        pageTitle: 'Bảng điều khiển khách hàng', welcome: 'Xin chào',
        welcomeSub: 'Theo dõi số lượng đồ uống đã mua bằng biểu đồ cột và biểu đồ tròn.',
        totalOrders: 'Tổng đơn hàng', totalDrinks: 'Tổng số ly', totalSpent: 'Tổng chi tiêu',
        barTitle: 'Biểu đồ cột - Số lượng theo đồ uống', pieTitle: 'Biểu đồ tròn - Tỷ lệ mua',
        emptyData: 'Bạn chưa có dữ liệu mua hàng. Hãy đặt đơn để xem biểu đồ.',
        menu: 'Thực đơn', vouchers: 'Ưu đãi', others: 'Khác', profile: 'Hồ sơ của tôi',
        centerTotal: 'Tổng', currency: 'VND'
      }
    };
    let currentLang = localStorage.getItem('fm_lang') || ((navigator.language || '').toLowerCase().startsWith('vi') ? 'vi' : 'en');
    function tr(k) { return (I18N[currentLang] && I18N[currentLang][k]) || I18N.en[k] || k; }

    function getSession() {
      return JSON.parse(localStorage.getItem('fm_session') || 'null');
    }

    function getOrders() {
      return JSON.parse(localStorage.getItem('fm_orders') || '[]');
    }

    function money(v) {
      const locale = currentLang === 'vi' ? 'vi-VN' : 'en-US';
      return new Intl.NumberFormat(locale).format(Math.round(v || 0));
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.getElementById('lang-select').value = currentLang;
      document.getElementById('page-title').textContent = tr('pageTitle');
      document.getElementById('welcome-sub').textContent = tr('welcomeSub');
      document.getElementById('kpi-lbl-orders').textContent = tr('totalOrders');
      document.getElementById('kpi-lbl-qty').textContent = tr('totalDrinks');
      document.getElementById('kpi-lbl-spent').textContent = tr('totalSpent');
      document.getElementById('bar-title').textContent = tr('barTitle');
      document.getElementById('pie-title').textContent = tr('pieTitle');
      document.getElementById('empty-data').textContent = tr('emptyData');
      document.getElementById('ql-menu').textContent = tr('menu');
      document.getElementById('ql-vouchers').textContent = tr('vouchers');
      document.getElementById('ql-others').textContent = tr('others');
      document.getElementById('ql-profile').textContent = tr('profile');
    }

    function setLanguage(lang) {
      currentLang = (lang === 'vi') ? 'vi' : 'en';
      localStorage.setItem('fm_lang', currentLang);
      applyLanguage();
      renderDashboard();
    }

    function loadSidebarFallback() {
      const slot = document.getElementById('sidebar-slot');
      slot.innerHTML = '<aside style="width:220px;background:#fff;border-right:1px solid var(--border);padding:14px;">'
        + '<div style="font-weight:700;margin-bottom:10px;">Fresh Market</div>'
        + '<a href="/components/customer/dashboard-customer.html" style="display:block;margin:8px 0;color:var(--green-dark);text-decoration:none;">Dashboard</a>'
        + '<a href="/components/customer/products-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Menu</a>'
        + '<a href="/components/customer/voucher-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Vouchers</a>'
        + '<a href="/components/customer/orders-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Others</a>'
        + '<a href="/components/customer/setting-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">My Profile</a>'
        + '</aside>';
    }

    async function loadLayouts() {
      try {
        const sb = await fetch('/components/layout/sidebar-customer.html');
        if (sb.ok) {
          document.getElementById('sidebar-slot').innerHTML = await sb.text();
        } else {
          loadSidebarFallback();
        }
      } catch (e) {
        loadSidebarFallback();
      }

      try {
        const ft = await fetch('/components/layout/footer.html');
        if (ft.ok) {
          document.getElementById('footer-slot').innerHTML = await ft.text();
        }
      } catch (e) {}
    }

    function collectUserDrinkData(session) {
      const orders = getOrders();
      const myOrders = orders.filter(o => o && (o.customerEmail === session.email || o.customer === session.name));
      const totals = {};
      let totalQty = 0;
      let totalSpent = 0;

      myOrders.forEach(order => {
        totalSpent += Number(order.total || 0);
        (order.items || []).forEach(item => {
          const name = item.name || item.cat || 'Other';
          const qty = Number(item.qty || 1);
          totals[name] = (totals[name] || 0) + qty;
          totalQty += qty;
        });
      });

      return {
        myOrders,
        entries: Object.entries(totals).sort((a, b) => b[1] - a[1]).slice(0, 8),
        totalQty,
        totalSpent
      };
    }

    function drawBar(canvas, entries) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const pad = { t: 16, r: 12, b: 42, l: 40 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;
      const max = Math.max(...entries.map(e => e[1]), 1);
      const bw = cw / entries.length;

      ctx.strokeStyle = '#e8ece9';
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (ch * i / 4);
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
      }

      entries.forEach((e, i) => {
        const x = pad.l + i * bw + 8;
        const barW = Math.max(18, bw - 16);
        const barH = (e[1] / max) * (ch - 8);
        const y = pad.t + ch - barH;

        ctx.fillStyle = '#1d9e75';
        ctx.fillRect(x, y, barW, barH);

        ctx.fillStyle = '#234';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(e[1]), x + barW / 2, y - 6);

        const name = e[0].length > 8 ? e[0].slice(0, 8) + '...' : e[0];
        ctx.fillStyle = '#667';
        ctx.fillText(name, x + barW / 2, h - 16);
      });
    }

    function drawPie(canvas, entries) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const total = entries.reduce((s, e) => s + e[1], 0) || 1;
      const cx = Math.min(w * 0.35, 160);
      const cy = h * 0.5;
      const r = Math.min(110, h * 0.34);
      const colors = ['#1d9e75', '#3ab58f', '#0f7c5d', '#87d7be', '#f59e0b', '#ef4444', '#6366f1', '#14b8a6'];

      let angle = -Math.PI / 2;
      entries.forEach((e, i) => {
        const slice = (e[1] / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, angle, angle + slice);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        angle += slice;
      });

      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.48, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#334';
      ctx.textAlign = 'center';
      ctx.font = '12px sans-serif';
      ctx.fillText(tr('centerTotal'), cx, cy - 4);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(String(total), cx, cy + 18);

      let ly = 42;
      entries.forEach((e, i) => {
        const color = colors[i % colors.length];
        const pct = Math.round((e[1] / total) * 100);
        ctx.fillStyle = color;
        ctx.fillRect(w * 0.62, ly - 9, 10, 10);
        ctx.fillStyle = '#334';
        ctx.textAlign = 'left';
        ctx.font = '12px sans-serif';
        const label = (e[0].length > 16 ? e[0].slice(0, 16) + '...' : e[0]) + ' - ' + pct + '%';
        ctx.fillText(label, w * 0.62 + 16, ly);
        ly += 20;
      });
    }

    function renderDashboard() {
      const s = getSession();
      if (!s) {
        location.href = '/components/auth/login.html';
        return;
      }

      document.getElementById('welcome-name').textContent = tr('welcome') + ', ' + (s.name || 'Customer');

      const result = collectUserDrinkData(s);
      document.getElementById('kpi-orders').textContent = String(result.myOrders.length);
      document.getElementById('kpi-qty').textContent = String(result.totalQty);
      document.getElementById('kpi-spent').textContent = money(result.totalSpent) + ' ' + tr('currency');

      const hasData = result.entries.length > 0;
      document.getElementById('chart-section').style.display = hasData ? 'grid' : 'none';
      document.getElementById('empty-data').style.display = hasData ? 'none' : 'block';

      if (hasData) {
        drawBar(document.getElementById('barChart'), result.entries);
        drawPie(document.getElementById('pieChart'), result.entries);
      }
    }

    window.addEventListener('resize', () => {
      const s = getSession();
      if (!s) return;
      const result = collectUserDrinkData(s);
      if (result.entries.length) {
        drawBar(document.getElementById('barChart'), result.entries);
        drawPie(document.getElementById('pieChart'), result.entries);
      }
    });

    (async function init() {
      await loadLayouts();
      applyLanguage();
      renderDashboard();
      document.getElementById('lang-select').addEventListener('change', (e) => setLanguage(e.target.value));
    })();
  </script>
</body>
</html>
