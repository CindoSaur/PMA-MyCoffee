<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Menu — Fresh Market</title>
	<link rel="stylesheet" href="/style/style.css" />
	<style>
		.container{max-width:1100px;margin:0 auto;padding:3rem 2.5rem}
		.sec-title{font-family:var(--serif);font-size:28px;margin-bottom:6px}
		.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
		.prod-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
		.prod-img{height:140px;background:#eee;display:flex;align-items:center;justify-content:center}
		.prod-body{padding:12px}
		.prod-name{font-weight:600;color:var(--text)}
		.prod-price{font-weight:700;color:var(--green-dark);margin-top:8px}
	</style>
</head>
<body>

<div style="display:flex;min-height:100vh">
	<div id="sidebar-slot"></div>
	<div class="dash-main">
		<div class="dash-topbar"><div class="dash-title">Menu</div></div>
		<div class="dash-content">

			<div class="container">
	<div class="section-label">Menu</div>
	<div class="sec-title">All Drinks</div>
	<div class="sec-sub">Browse our cold-pressed juices, smoothies and herbal teas.</div>

	<div id="products" class="products-grid" style="margin-top:18px"></div>
			</div>

		</div>
	</div>
</div>

<div id="footer-slot"></div>

<script>
async function loadComponent(slot, url){ try{ const r=await fetch(url); if(!r.ok) throw 0; document.getElementById(slot).innerHTML=await r.text(); }catch(e){console.warn('load failed',url);} }
loadComponent('footer-slot','/components/layout/footer.html');

// load the customer sidebar and set session name
(async function(){
	try{
		const res = await fetch('/components/layout/sidebar-customer.html');
		if(res.ok){ document.getElementById('sidebar-slot').innerHTML = await res.text(); }
	}catch(e){console.warn('sidebar load failed',e)}
	try{ const s = JSON.parse(localStorage.getItem('fm_session')||'null'); if(s){ document.getElementById('sb-name')?.textContent = s.name; document.getElementById('sb-role')?.textContent = s.role||'customer'; } }catch(e){}
	try{ render(); }catch(e){ console.warn('render error',e); }
})();

function getProducts(){ return JSON.parse(localStorage.getItem('fm_products')||'[]'); }
function render(){ const prods = getProducts(); const wrap=document.getElementById('products'); if(!prods.length){ wrap.innerHTML='<div style="padding:3rem;color:var(--text-light);text-align:center">No products yet.</div>'; return;} wrap.innerHTML = prods.map(p=>`<div class="prod-card"><div class="prod-img"><img src="${p.img||'https://via.placeholder.com/300x140'}" style="width:100%;height:100%;object-fit:cover"/></div><div class="prod-body"><div class="prod-name">${p.name}</div><div class="prod-desc" style="font-size:13px;color:var(--text-mid);margin-top:6px">${p.desc||''}</div><div class="prod-price">₫${p.price}</div></div></div>`).join(''); }
window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
