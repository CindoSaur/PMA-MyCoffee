<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vouchers — PolyCoffee</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    body { background:var(--bg); }
    .portal-shell { display:flex; min-height:100vh; }
    .dash-main { flex:1; min-width:0; display:flex; flex-direction:column; }
    .dash-topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 2rem; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .dash-title { font-family:var(--serif); font-size:1.15rem; font-weight:600; color:var(--text); }
    .dash-content { padding:1.75rem 2rem; flex:1; }
    .section-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1.5rem; }
    .section-hd { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); }
    .section-title { font-family:var(--serif); font-size:1rem; font-weight:600; color:var(--text); }
    .section-body { padding:1.5rem; }
    .page-hd { margin-bottom:1.75rem; }
    .page-hd h2 { font-family:var(--serif); font-size:1.5rem; font-weight:600; color:var(--text); }
    .page-hd p { font-size:13px; color:var(--text-mid); margin-top:4px; }
    .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:1rem; }
    .form-label { font-size:13px; font-weight:500; color:var(--text); }
    .form-input { padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:var(--sans); font-size:14px; color:var(--text); background:#fff; outline:none; transition:border-color .2s; width:100%; }
    .form-input:focus { border-color:var(--green); }
    .form-input:disabled { background:var(--bg2); color:var(--text-light); cursor:not-allowed; }
    .btn-save { display:inline-flex; align-items:center; gap:7px; padding:10px 22px; background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; transition:.2s; }
    .btn-save:hover { background:var(--green-dark); }
    .btn-outline { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; background:#fff; color:var(--text); border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:var(--sans); font-size:13px; cursor:pointer; transition:.2s; }
    .btn-outline:hover { border-color:var(--text); }
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:500; }
    .badge-delivered  { background:#dcfce7; color:#15803d; }
    .badge-processing { background:#fef9c3; color:#854d0e; }
    .badge-cancelled  { background:#fee2e2; color:#b91c1c; }
    .badge-customer { background:var(--green-light); color:var(--green-dark); }
    .empty-state { text-align:center; padding:3rem; color:var(--text-light); }
    .empty-state .mi { font-size:48px; display:block; margin-bottom:1rem; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(100px); background:#1a1a18; color:#fff; padding:14px 22px; border-radius:var(--radius); font-size:13px; white-space:nowrap; opacity:0; pointer-events:none; transition:all .35s cubic-bezier(.34,1.56,.64,1); z-index:9999; display:flex; align-items:center; gap:10px; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast-dot { width:8px; height:8px; border-radius:50%; background:var(--green-mid); flex-shrink:0; }

  </style>
</head>
<body>

<div id="toast" class="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<div class="portal-shell">
  <div id="sidebar-slot"></div>
  <div class="dash-main">
    <div class="dash-topbar">
      <div class="dash-title">Vouchers</div>
      <div id="topbar-right"></div>
    </div>
    <div class="dash-content">

      <div class="page-hd"><h2>Vouchers & Offers</h2><p>Exclusive deals and discount codes for your next order.</p></div>

      <!-- Active voucher indicator -->
      <div id="active-voucher-banner" style="display:none;background:var(--green-light);border:1.5px solid var(--green-mid);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;font-size:13px;color:var(--green-dark)">
        <span class="mi">check_circle</span>
        <span>Voucher <strong id="active-code"></strong> is applied to your cart.</span>
        <button onclick="removeVoucher()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--green-dark);font-size:13px;text-decoration:underline">Remove</button>
      </div>

      <!-- Voucher grid -->
      <div id="voucher-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:2rem"></div>

      <!-- Redeem custom code -->
      <div class="section-card">
        <div class="section-hd"><div class="section-title">Redeem a Code</div></div>
        <div class="section-body">
          <p style="font-size:13px;color:var(--text-mid);margin-bottom:1rem">Have a code? Enter it below to apply to your next order.</p>
          <div style="display:flex;gap:10px">
            <input class="form-input" type="text" id="manual-code" placeholder="e.g. FRESHMARKET" style="max-width:280px" />
            <button class="btn-save" onclick="redeemManual()">Apply</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const FM_SESSION = 'fm_session';
const FM_USERS   = 'fm_users';
const FM_ORDERS  = 'fm_orders';
function getSession(){ return JSON.parse(localStorage.getItem(FM_SESSION)||'null'); }
function getUsers()  { return JSON.parse(localStorage.getItem(FM_USERS)||'[]'); }
function saveUsers(u){ localStorage.setItem(FM_USERS,JSON.stringify(u)); }
function getOrders() { return JSON.parse(localStorage.getItem(FM_ORDERS)||'[]'); }
function fmtMoney(v) { if(!v) return '₫0'; if(v>=1000) return '₫'+(v/1000).toFixed(0)+'K'; return '₫'+v.toFixed(0); }
function logout()    { localStorage.removeItem(FM_SESSION); window.location.href='/'; }

let toastTmr;
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show'); clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2800);
}


// ── Sidebar loader ──────────────────────────
async function loadSidebar() {
  const slot = document.getElementById('sidebar-slot');
  if (!slot) return;
  try {
    const res = await fetch('/components/layout/sidebar-customer.html');
    if (res.ok) { const html = await res.text(); if (html.trim()) { slot.innerHTML = html; return; } }
  } catch(e) {}
  // Fallback inline sidebar
  slot.innerHTML = buildFallbackSidebar();
}

function buildFallbackSidebar() {
  const path = window.location.pathname;
  const links = [
    { href:'/components/customer/dashboard-customer.html', icon:'dashboard',       label:'Dashboard',  section:'Overview' },
    { href:'/components/customer/products-customer.html',  icon:'inventory_2',      label:'Menu',       section:'Shop' },
    { href:'/components/customer/voucher-customer.html',   icon:'local_offer',      label:'Vouchers',   section:null },
    { href:'/components/customer/orders-customer.html',    icon:'receipt_long',     label:'Orders',     section:null },
    { href:'/components/customer/delivery-customer.html',  icon:'delivery_dining',  label:'Delivery',   section:null },
    { href:'/components/customer/user-customer.html',      icon:'manage_accounts',  label:'My Profile', section:'Account' },
    { href:'/components/customer/setting-customer.html',   icon:'settings',         label:'Settings',   section:null },
  ];
  let html = '<aside style="width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden">'
    + '<a href="/" style="display:flex;align-items:center;gap:10px;padding:1.4rem 1.25rem 1rem;font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);text-decoration:none">'
    + '<div style="width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center"><span class="mi" style="font-size:16px;color:#fff">local_drink</span></div>PolyCoffee'
    + '</a>';
  let lastSection = null;
  links.forEach(l => {
    if (l.section && l.section !== lastSection) {
      html += '<div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase">' + l.section + '</div>';
      lastSection = l.section;
    }
    const active = path.includes(l.href.split('/').pop());
    html += '<a href="' + l.href + '" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:' + (active ? 'var(--green-dark)' : 'var(--text-mid)') + ';text-decoration:none;font-weight:' + (active ? '500' : '400') + ';background:' + (active ? 'var(--green-light)' : 'none') + '"><span class="mi">' + l.icon + '</span> ' + l.label + '</a>';
  });
  html += '<div style="margin-top:auto;padding:1rem;border-top:1px solid var(--border);background:#fff;position:sticky;bottom:0;flex-shrink:0">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    + '<div id="sb-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700">&#8212;</div>'
    + '<div><div id="sb-name" style="font-size:13px;font-weight:600;color:var(--text)">&#8212;</div><div id="sb-role" style="font-size:11px;color:var(--text-light)">customer</div></div>'
    + '</div>'
    + '<button onclick="if(confirm(\'Sign out?\')){localStorage.removeItem(\'fm_session\');location.href=\'\/\'}" style="display:flex;align-items:center;gap:6px;width:100%;padding:.55rem .75rem;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-mid);font-size:12px;font-family:var(--sans);cursor:pointer">'
    + '<span class="mi" style="font-size:15px">logout</span> Sign out'
    + '</button>'
    + '</div></aside>';
  return html;
}



const DEFAULT_VOUCHERS = [
  { code:'FRESHMARKET', title:'Free delivery', desc:'Free delivery on your first order', type:'delivery', value:100, min:0, expiry:'2026-12-31' },
  { code:'WELCOME15',   title:'15% off',       desc:'15% off your first purchase',       type:'percent',  value:15,  min:0, expiry:'2026-12-31' },
  { code:'BOTTLE10',    title:'10% off',        desc:'10% off when you return bottles',   type:'percent',  value:10,  min:0, expiry:'2026-12-31' },
  { code:'SUMMER5',     title:'₫5K off',        desc:'₫5,000 off orders over ₫50,000',    type:'fixed',    value:5000,min:50000,expiry:'2026-09-01' },
];

function getVouchers() {
  const saved = JSON.parse(localStorage.getItem('fm_vouchers')||'[]');
  return saved.length ? saved : DEFAULT_VOUCHERS;
}

function getApplied() { return localStorage.getItem('fm_applied_voucher')||''; }

function renderVouchers() {
  const applied = getApplied();
  const banner = document.getElementById('active-voucher-banner');
  const codeEl = document.getElementById('active-code');
  if (applied) { banner.style.display='flex'; if(codeEl) codeEl.textContent=applied; }
  else { banner.style.display='none'; }

  const vouchers = getVouchers();
  document.getElementById('voucher-grid').innerHTML = vouchers.map(v => {
    const isApplied = v.code === applied;
    const exp = new Date(v.expiry); const expired = exp < new Date();
    return `<div style="background:#fff;border:1.5px solid ${isApplied?'var(--green)':expired?'var(--border)':'var(--border)'};border-radius:var(--radius);overflow:hidden;${expired?'opacity:.6':''}">
      <div style="background:${isApplied?'var(--green-light)':expired?'var(--bg2)':'var(--bg2)'};padding:1.25rem;border-bottom:1px solid var(--border)">
        <div style="font-family:var(--serif);font-size:1.3rem;font-weight:700;color:${isApplied?'var(--green-dark)':'var(--text);letter-spacing:.05em'}">${v.code}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:4px">${v.title}</div>
      </div>
      <div style="padding:1rem">
        <div style="font-size:13px;color:var(--text-mid);margin-bottom:10px">${v.desc}</div>
        <div style="font-size:11px;color:var(--text-light);margin-bottom:12px">Expires: ${exp.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
        ${expired
          ? '<span style="font-size:12px;color:var(--text-light)">Expired</span>'
          : isApplied
          ? '<button onclick="removeVoucher()" style="padding:7px 16px;background:none;border:1.5px solid var(--green);color:var(--green);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:var(--sans)">✓ Applied — Remove</button>'
          : `<button onclick="applyVoucher('${v.code}')" style="padding:7px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:var(--sans)">Apply Code</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function applyVoucher(code) {
  localStorage.setItem('fm_applied_voucher', code);
  showToast('Voucher ' + code + ' applied!');
  renderVouchers();
}
function removeVoucher() {
  localStorage.removeItem('fm_applied_voucher');
  showToast('Voucher removed');
  renderVouchers();
}
function redeemManual() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (!code) { showToast('Please enter a code'); return; }
  const vouchers = getVouchers();
  if (!vouchers.find(v=>v.code===code)) { showToast('Invalid or expired code'); return; }
  applyVoucher(code);
  document.getElementById('manual-code').value = '';
}

function pageInit(s) { renderVouchers(); }


window.addEventListener('DOMContentLoaded', async () => {
  const s = getSession();
  if (!s) { window.location.href = '/components/auth/login.html'; return; }
  if (s.role === 'admin' || s.role === 'staff') { window.location.href = '/components/admin/dashboard.html'; return; }
  await loadSidebar();
  // Populate sidebar session info
  const av = document.getElementById('sb-avatar');
  const nm = document.getElementById('sb-name');
  const rl = document.getElementById('sb-role');
  if (av) { av.textContent = s.name.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase(); }
  if (nm) nm.textContent = s.name;
  if (rl) rl.textContent = s.role || 'customer';
  if (typeof pageInit === 'function') pageInit(s);
});
</script>
</body>
</html>
