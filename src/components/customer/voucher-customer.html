<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vouchers - Customer</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    .page { display: flex; min-height: 100vh; background: var(--bg); }
    .main { flex: 1; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .topbar h1 { margin: 0; font-family: var(--serif); font-size: 26px; }
    .lang-switch { border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; padding: 7px 10px; font-size: 13px; color: var(--text); }
    .content { padding: 24px; max-width: 1120px; }

    .hero {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #fff, #ebfbf4);
      padding: 16px;
      margin-bottom: 14px;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .code { font-family: var(--serif); font-size: 22px; margin: 0; color: var(--text); }
    .desc { color: var(--text-mid); font-size: 13px; margin-top: 6px; min-height: 38px; }
    .chip { display: inline-block; margin-top: 8px; font-size: 12px; background: #f3f4f6; color: #334155; border-radius: 999px; padding: 5px 10px; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .btn { flex: 1; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #fff; padding: 8px; cursor: pointer; }
    .btn.primary { border-color: var(--green); background: #1d9e75; color: #fff; }
    .btn.used { border-color: #f59e0b; background: #fff7ed; color: #b45309; }

    .empty { background: #fff; border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; color: var(--text-mid); }
  </style>
</head>
<body>
  <div class="page">
    <div id="sidebar-slot"></div>
    <main class="main">
      <div class="topbar">
        <h1 id="page-title">Vouchers</h1>
        <select id="lang-select" class="lang-switch" aria-label="Language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
      <div class="content">
        <section class="hero">
          <strong id="hero-title">Voucher wallet</strong>
          <div id="hero-sub" style="margin-top:6px;color:var(--text-mid);font-size:13px;">Sample vouchers are auto-seeded using const data. Use or undo usage and state is saved in localStorage.</div>
        </section>

        <section id="grid" class="grid"></section>
        <section id="empty" class="empty" style="display:none;">No vouchers available.</section>
      </div>
    </main>
  </div>

  <div id="footer-slot"></div>

  <script>
    const I18N = {
      en: {
        pageTitle: 'Vouchers', heroTitle: 'Voucher wallet',
        heroSub: 'Sample vouchers are auto-seeded using const data. Use or undo usage and state is saved in localStorage.',
        empty: 'No vouchers available.',
        minOrder: 'Min order', expires: 'Expires', copy: 'Copy', useNow: 'Use now', undoUse: 'Undo use',
        copied: 'Copied', copyFailed: 'Copy failed', currency: 'VND'
      },
      vi: {
        pageTitle: 'Ưu đãi', heroTitle: 'Ví mã giảm giá',
        heroSub: 'Dữ liệu mẫu được khởi tạo bằng const. Bạn có thể dùng hoặc hoàn tác và trạng thái sẽ lưu trong localStorage.',
        empty: 'Hiện chưa có ưu đãi nào.',
        minOrder: 'Đơn tối thiểu', expires: 'Hết hạn', copy: 'Sao chép', useNow: 'Dùng ngay', undoUse: 'Hoàn tác',
        copied: 'Đã sao chép', copyFailed: 'Sao chép thất bại', currency: 'VND'
      }
    };
    let currentLang = localStorage.getItem('fm_lang') || ((navigator.language || '').toLowerCase().startsWith('vi') ? 'vi' : 'en');
    function tr(k) { return (I18N[currentLang] && I18N[currentLang][k]) || I18N.en[k] || k; }

    const SAMPLE_VOUCHERS = [
      { id: 1, code: 'WELCOME10', title: '10% off first order', minOrder: 100000, expires: '2026-12-31' },
      { id: 2, code: 'FREESHIP', title: 'Free shipping', minOrder: 80000, expires: '2026-11-30' },
      { id: 3, code: 'SMOOTHIE25', title: '25,000 VND off smoothies', minOrder: 120000, expires: '2026-10-31' }
    ];

    function getSession() { return JSON.parse(localStorage.getItem('fm_session') || 'null'); }
    function getVoucherWalletKey(email) { return 'fm_voucher_wallet_' + String(email || 'guest'); }

    function getVouchers() {
      const list = JSON.parse(localStorage.getItem('fm_vouchers') || '[]');
      if (Array.isArray(list) && list.length) return list;
      localStorage.setItem('fm_vouchers', JSON.stringify(SAMPLE_VOUCHERS));
      return SAMPLE_VOUCHERS;
    }

    function getWallet(email) {
      return JSON.parse(localStorage.getItem(getVoucherWalletKey(email)) || '{"usedCodes":[]}');
    }

    function saveWallet(email, wallet) {
      localStorage.setItem(getVoucherWalletKey(email), JSON.stringify(wallet));
    }

    function money(v) {
      const locale = currentLang === 'vi' ? 'vi-VN' : 'en-US';
      return new Intl.NumberFormat(locale).format(Math.round(v || 0)) + ' ' + tr('currency');
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.getElementById('lang-select').value = currentLang;
      document.getElementById('page-title').textContent = tr('pageTitle');
      document.getElementById('hero-title').textContent = tr('heroTitle');
      document.getElementById('hero-sub').textContent = tr('heroSub');
      document.getElementById('empty').textContent = tr('empty');
    }

    function setLanguage(lang) {
      currentLang = (lang === 'vi') ? 'vi' : 'en';
      localStorage.setItem('fm_lang', currentLang);
      applyLanguage();
      render();
    }

    function loadSidebarFallback() {
      document.getElementById('sidebar-slot').innerHTML = '<aside style="width:220px;background:#fff;border-right:1px solid var(--border);padding:14px;">'
        + '<div style="font-weight:700;margin-bottom:10px;">MyCoffee</div>'
        + '<a href="/components/customer/dashboard-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Dashboard</a>'
        + '<a href="/components/customer/products-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Menu</a>'
        + '<a href="/components/customer/voucher-customer.html" style="display:block;margin:8px 0;color:var(--green-dark);text-decoration:none;">Vouchers</a>'
        + '<a href="/components/customer/orders-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Others</a>'
        + '<a href="/components/customer/setting-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">My Profile</a>'
        + '</aside>';
    }

    async function loadLayouts() {
      try {
        const sb = await fetch('/components/layout/sidebar-customer.html');
        if (sb.ok) document.getElementById('sidebar-slot').innerHTML = await sb.text();
        else loadSidebarFallback();
      } catch (e) { loadSidebarFallback(); }

      try {
        const ft = await fetch('/components/layout/footer.html');
        if (ft.ok) document.getElementById('footer-slot').innerHTML = await ft.text();
      } catch (e) {}
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(() => alert(tr('copied') + ': ' + code)).catch(() => alert(tr('copyFailed')));
    }

    function toggleUse(code) {
      const s = getSession();
      const email = s ? s.email : 'guest';
      const wallet = getWallet(email);
      const i = wallet.usedCodes.indexOf(code);
      if (i >= 0) wallet.usedCodes.splice(i, 1);
      else wallet.usedCodes.push(code);
      saveWallet(email, wallet);
      render();
    }

    function render() {
      const s = getSession();
      const email = s ? s.email : 'guest';
      const wallet = getWallet(email);
      const vouchers = getVouchers();
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');

      if (!vouchers.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = vouchers.map(v => {
        const used = wallet.usedCodes.includes(v.code);
        return '<article class="card">'
          + '<h3 class="code">' + v.code + '</h3>'
          + '<div class="desc">' + (v.title || '') + '</div>'
          + '<div class="chip">' + tr('minOrder') + ': ' + money(v.minOrder || 0) + '</div>'
          + '<div class="chip" style="margin-left:6px;">' + tr('expires') + ': ' + (v.expires || '-') + '</div>'
          + '<div class="row">'
          + '<button class="btn" onclick="copyCode(\'' + v.code + '\')">' + tr('copy') + '</button>'
          + '<button class="btn ' + (used ? 'used' : 'primary') + '" onclick="toggleUse(\'' + v.code + '\')">' + (used ? tr('undoUse') : tr('useNow')) + '</button>'
          + '</div></article>';
      }).join('');
    }

    window.copyCode = copyCode;
    window.toggleUse = toggleUse;

    (async function init() {
      await loadLayouts();
      applyLanguage();
      render();
      document.getElementById('lang-select').addEventListener('change', (e) => setLanguage(e.target.value));
    })();
  </script>
</body>
</html>
