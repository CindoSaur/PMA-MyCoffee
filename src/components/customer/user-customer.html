<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — Fresh Market</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    .account-shell { min-height:100vh; display:flex; flex-direction:column; }
    main { flex:1; }
    .container { width:100%; max-width:1100px; margin:0 auto; padding:3rem 2.5rem; }
    .acct-grid { display:grid; grid-template-columns:320px 1fr; gap:20px; }
    .card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
    .profile-avatar { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; margin-bottom:10px; }
    .profile-name { font-family:var(--serif); font-size:20px; font-weight:600; color:var(--text); }
    .profile-email { font-size:13px; color:var(--text-mid); }
    table { width:100%; border-collapse:collapse; }
    thead th{ text-align:left; font-size:11px; padding:10px; color:var(--text-light); border-bottom:1px solid var(--border); }
    tbody td{ padding:10px; font-size:13px; border-bottom:1px solid rgba(0,0,0,.04); }
    .empty { text-align:center; color:var(--text-light); padding:2rem; }
  </style>
</head>
<body>

<div style="display:flex;min-height:100vh">
  <div id="sidebar-slot"></div>
  <div class="dash-main">
    <div class="dash-topbar"><div class="dash-title">My Profile</div></div>
    <div class="dash-content">

      <div class="container">
        <div class="section-label">Account</div>
        <div class="section-title">My Profile</div>
        <div class="acct-grid">
          <div class="card">
            <div id="prof-avatar" class="profile-avatar">—</div>
            <div class="profile-name" id="prof-name">—</div>
            <div class="profile-email" id="prof-email">—</div>
            <div style="margin-top:12px">
              <button class="btn-white" id="edit-profile-btn" onclick="openEdit()">Edit profile</button>
              <button style="margin-left:8px" class="btn-white" onclick="logout()">Sign out</button>
            </div>
          </div>

          <div>
            <div class="card" style="margin-bottom:16px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="font-weight:600">Recent Orders</div>
                <div style="font-size:13px;color:var(--text-light)" id="orders-count">0 orders</div>
              </div>
              <div id="orders-wrap"></div>
            </div>

            <div class="card">
              <div style="font-weight:600;margin-bottom:8px">Addresses</div>
              <div style="font-size:13px;color:var(--text-light)">Manage delivery addresses in your profile (simple demo mode).</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title">Edit Profile</div><button class="modal-close" onclick="closeEdit()"><span class="mi">close</span></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Full name</label><input class="form-input" id="m-name" /></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="m-email" disabled /></div>
      <div class="form-group"><label class="form-label">New password (optional)</label><input class="form-input" id="m-pw" type="password" /></div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeEdit()">Cancel</button><button class="btn-save" onclick="saveProfile()">Save</button></div>
  </div>
</div>

<script>
  async function loadComponent(slot, url){ try{ const r=await fetch(url); if(!r.ok) throw 0; document.getElementById(slot).innerHTML=await r.text(); }catch(e){console.warn('load failed',url);} }
  // ensure footer slot exists for injection
  if(!document.getElementById('footer-slot')){ const f=document.createElement('div'); f.id='footer-slot'; document.body.appendChild(f); }
const AUTH_SESSION_KEY = 'fm_session';
const ORDERS_KEY = 'fm_orders';
function getSession(){ return JSON.parse(localStorage.getItem(AUTH_SESSION_KEY)||'null'); }
function getOrders(){ return JSON.parse(localStorage.getItem(ORDERS_KEY)||'[]'); }
function logout(){ localStorage.removeItem(AUTH_SESSION_KEY); location.href='/'; }

function fmtMoney(v){ return '₫'+(v||0); }

function renderProfile(){
  const s = getSession();
  if(!s){ alert('Please sign in'); location.href='/'; return; }
  document.getElementById('prof-name').textContent = s.name;
  document.getElementById('prof-email').textContent = s.email;
  const av = document.getElementById('prof-avatar'); av.textContent = s.name.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase(); av.style.background = '#1d9e75';
  renderOrders();
}

function renderOrders(){
  const s = getSession();
  const all = getOrders().filter(o=>o.customerEmail===s.email || o.customer===s.name);
  document.getElementById('orders-count').textContent = `${all.length} order${all.length!==1?'s':''}`;
  const wrap = document.getElementById('orders-wrap');
  if(!all.length){ wrap.innerHTML='<div class="empty">You have no orders yet.</div>'; return; }
  wrap.innerHTML = `<table><thead><tr><th>Order</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>${all.slice().reverse().map(o=>{
    const items = (o.items||[]).map(i=>i.name+(i.qty>1?' x'+i.qty:'')) .join(', ');
    const d = new Date(o.date||'');
    const date = isNaN(d)?'–':d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    return `<tr><td>#${o.id}</td><td>${items}</td><td style="font-weight:600">${fmtMoney(o.total)}</td><td>${o.status||'—'}</td><td>${date}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function openEdit(){ const s=getSession(); document.getElementById('m-name').value=s.name; document.getElementById('m-email').value=s.email; document.getElementById('editModal').classList.add('open'); }
function closeEdit(){ document.getElementById('editModal').classList.remove('open'); }
function saveProfile(){ const s=getSession(); const n=document.getElementById('m-name').value.trim(); const pw=document.getElementById('m-pw').value; if(!n){ alert('Enter name'); return; } const users = JSON.parse(localStorage.getItem('fm_users')||'[]'); const idx = users.findIndex(u=>u.email===s.email); if(idx!==-1){ users[idx].name=n; if(pw) users[idx].password=pw; localStorage.setItem('fm_users',JSON.stringify(users)); }
  const next = Object.assign({}, s, { name:n }); if(pw) next.password=pw; localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(next)); closeEdit(); renderProfile(); alert('Profile saved'); }

// load sidebar and init when DOM ready
window.addEventListener('DOMContentLoaded', async ()=>{
  const sidebarSlot = document.getElementById('sidebar-slot');

  // Try to fetch sidebar from file
  let sidebarLoaded = false;
  try{
    const res = await fetch('/components/layout/sidebar-customer.html');
    if(res.ok){
      sidebarSlot.innerHTML = await res.text();
      sidebarLoaded = true;
    }
  }catch(e){
    console.warn('Sidebar fetch failed, using fallback');
  }

  // If fetch failed or returned nothing, use fallback
  if(!sidebarLoaded || !sidebarSlot.innerHTML.trim()){
    sidebarSlot.innerHTML = `<aside class="sidebar" style="width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;padding:0">
      <div style="padding:1.4rem 1.25rem 1rem;font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)">
        <span class="mi" style="font-size:16px;color:#1d9e75;margin-right:8px">local_drink</span>Fresh Market
      </div>
      <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase">Overview</div>
      <a href="/components/customer/dashboard-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">dashboard</span> Dashboard</a>
      <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:1rem">Shop</div>
      <a href="/components/customer/products-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">inventory_2</span> Menu</a>
      <a href="/components/customer/voucher-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">local_offer</span> Vouchers</a>
      <a href="/components/customer/orders-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">receipt_long</span> Orders</a>
      <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:1rem">Account</div>
      <a href="/components/customer/user-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:#1d9e75;text-decoration:none;cursor:pointer;font-weight:500"><span class="mi">person</span> My Profile</a>
      <a href="/components/customer/setting-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">settings</span> Settings</a>
      <div style="margin-top:auto;padding:1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center"><span class="mi" style="font-size:18px;color:#1d9e75">person</span></div>
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text)" id="sb-name">—</div>
          <div style="font-size:11px;color:var(--text-light)" id="sb-role">customer</div>
        </div>
      </div>
    </aside>`;
  }

  // Populate session info
  const s = JSON.parse(localStorage.getItem('fm_session')||'null');
  if(s){
    const nameEl = document.getElementById('sb-name');
    const roleEl = document.getElementById('sb-role');
    if(nameEl) nameEl.textContent = s.name;
    if(roleEl) roleEl.textContent = s.role||'customer';
  }

  renderProfile();
});
</script>

</body>
</html>
