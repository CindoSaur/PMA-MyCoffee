<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Customer</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    .page { display: flex; min-height: 100vh; background: var(--bg); }
    .main { flex: 1; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .topbar h1 { margin: 0; font-family: var(--serif); font-size: 26px; }
    .lang-switch { border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; padding: 7px 10px; font-size: 13px; color: var(--text); }
    .content { padding: 24px; max-width: 980px; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .head { padding: 16px; border-bottom: 1px solid var(--border); }
    .head h2 { margin: 0; font-size: 20px; }
    .head p { margin: 6px 0 0; color: var(--text-mid); font-size: 13px; }
    .body { padding: 16px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .full { grid-column: 1 / -1; }
    .label { font-size: 12px; color: var(--text-mid); }
    .input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
    }
    .input:disabled { background: #f8faf9; color: #667085; }

    .actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; cursor: pointer; background: #fff; }
    .btn.primary { border-color: var(--green); background: #1d9e75; color: #fff; }

    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div id="sidebar-slot"></div>
    <main class="main">
      <div class="topbar">
        <h1 id="page-title">My Profile</h1>
        <select id="lang-select" class="lang-switch" aria-label="Language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
      <div class="content">
        <section class="card">
          <div class="head">
            <h2 id="card-title">Profile Information</h2>
            <p id="card-sub">Click Edit profile to update your information. All changes are saved in localStorage.</p>
          </div>

          <div class="body">
            <div class="grid">
              <div class="field">
                <label class="label" id="lbl-name">Full name</label>
                <input id="p-name" class="input" disabled />
              </div>
              <div class="field">
                <label class="label" id="lbl-email">Email</label>
                <input id="p-email" class="input" disabled />
              </div>
              <div class="field">
                <label class="label" id="lbl-phone">Phone</label>
                <input id="p-phone" class="input" disabled />
              </div>
              <div class="field">
                <label class="label" id="lbl-birth">Birth date</label>
                <input id="p-birth" class="input" type="date" disabled />
              </div>
              <div class="field full">
                <label class="label" id="lbl-address">Address</label>
                <input id="p-address" class="input" disabled />
              </div>
            </div>

            <div class="actions">
              <button id="btn-edit" class="btn" onclick="startEdit()">Edit profile</button>
              <button id="btn-save" class="btn primary" onclick="saveProfile()" style="display:none;">Save profile</button>
              <button id="btn-cancel" class="btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="footer-slot"></div>

  <script>
    const I18N = {
      en: {
        pageTitle: 'My Profile', cardTitle: 'Profile Information',
        cardSub: 'Click Edit profile to update your information. All changes are saved in localStorage.',
        name: 'Full name', email: 'Email', phone: 'Phone', birth: 'Birth date', address: 'Address',
        edit: 'Edit profile', save: 'Save profile', cancel: 'Cancel',
        nameRequired: 'Name is required', updateSuccess: 'Profile updated successfully'
      },
      vi: {
        pageTitle: 'Hồ sơ của tôi', cardTitle: 'Thông tin hồ sơ',
        cardSub: 'Nhấn Sửa hồ sơ để cập nhật thông tin. Mọi thay đổi sẽ được lưu trong localStorage.',
        name: 'Họ và tên', email: 'Email', phone: 'Số điện thoại', birth: 'Ngày sinh', address: 'Địa chỉ',
        edit: 'Sửa hồ sơ', save: 'Lưu hồ sơ', cancel: 'Hủy',
        nameRequired: 'Vui lòng nhập họ tên', updateSuccess: 'Cập nhật hồ sơ thành công'
      }
    };
    let currentLang = localStorage.getItem('fm_lang') || ((navigator.language || '').toLowerCase().startsWith('vi') ? 'vi' : 'en');
    function tr(k) { return (I18N[currentLang] && I18N[currentLang][k]) || I18N.en[k] || k; }

    function getSession() { return JSON.parse(localStorage.getItem('fm_session') || 'null'); }
    function getUsers() { return JSON.parse(localStorage.getItem('fm_users') || '[]'); }
    function saveUsers(list) { localStorage.setItem('fm_users', JSON.stringify(list)); }

    function getExtraKey(email) { return 'fm_profile_extra_' + String(email || 'guest'); }
    function getExtra(email) { return JSON.parse(localStorage.getItem(getExtraKey(email)) || '{}'); }
    function saveExtra(email, data) { localStorage.setItem(getExtraKey(email), JSON.stringify(data)); }

    function loadSidebarFallback() {
      document.getElementById('sidebar-slot').innerHTML = '<aside style="width:220px;background:#fff;border-right:1px solid var(--border);padding:14px;">'
        + '<div style="font-weight:700;margin-bottom:10px;">Fresh Market</div>'
        + '<a href="/components/customer/dashboard-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Dashboard</a>'
        + '<a href="/components/customer/products-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Menu</a>'
        + '<a href="/components/customer/voucher-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Vouchers</a>'
        + '<a href="/components/customer/orders-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Others</a>'
        + '<a href="/components/customer/setting-customer.html" style="display:block;margin:8px 0;color:var(--green-dark);text-decoration:none;">My Profile</a>'
        + '</aside>';
    }

    async function loadLayouts() {
      try {
        const sb = await fetch('/components/layout/sidebar-customer.html');
        if (sb.ok) document.getElementById('sidebar-slot').innerHTML = await sb.text();
        else loadSidebarFallback();
      } catch (e) { loadSidebarFallback(); }

      try {
        const ft = await fetch('/components/layout/footer.html');
        if (ft.ok) document.getElementById('footer-slot').innerHTML = await ft.text();
      } catch (e) {}
    }

    function setEditable(isEdit) {
      const ids = ['p-name', 'p-phone', 'p-birth', 'p-address'];
      ids.forEach(id => { document.getElementById(id).disabled = !isEdit; });
      document.getElementById('btn-edit').style.display = isEdit ? 'none' : 'inline-block';
      document.getElementById('btn-save').style.display = isEdit ? 'inline-block' : 'none';
      document.getElementById('btn-cancel').style.display = isEdit ? 'inline-block' : 'none';
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.getElementById('lang-select').value = currentLang;
      document.getElementById('page-title').textContent = tr('pageTitle');
      document.getElementById('card-title').textContent = tr('cardTitle');
      document.getElementById('card-sub').textContent = tr('cardSub');
      document.getElementById('lbl-name').textContent = tr('name');
      document.getElementById('lbl-email').textContent = tr('email');
      document.getElementById('lbl-phone').textContent = tr('phone');
      document.getElementById('lbl-birth').textContent = tr('birth');
      document.getElementById('lbl-address').textContent = tr('address');
      document.getElementById('btn-edit').textContent = tr('edit');
      document.getElementById('btn-save').textContent = tr('save');
      document.getElementById('btn-cancel').textContent = tr('cancel');
    }

    function setLanguage(lang) {
      currentLang = (lang === 'vi') ? 'vi' : 'en';
      localStorage.setItem('fm_lang', currentLang);
      applyLanguage();
    }

    function fillForm() {
      const s = getSession();
      if (!s) {
        location.href = '/components/auth/login.html';
        return;
      }

      const users = getUsers();
      const me = users.find(u => u.email === s.email) || s;
      const extra = getExtra(s.email);

      document.getElementById('p-name').value = me.name || '';
      document.getElementById('p-email').value = me.email || '';
      document.getElementById('p-phone').value = extra.phone || '';
      document.getElementById('p-birth').value = extra.birth || '';
      document.getElementById('p-address').value = extra.address || '';
    }

    function startEdit() { setEditable(true); }
    function cancelEdit() { fillForm(); setEditable(false); }

    function saveProfile() {
      const s = getSession();
      if (!s) return;

      const name = document.getElementById('p-name').value.trim();
      const phone = document.getElementById('p-phone').value.trim();
      const birth = document.getElementById('p-birth').value;
      const address = document.getElementById('p-address').value.trim();

      if (!name) {
        alert(tr('nameRequired'));
        return;
      }

      const users = getUsers();
      const idx = users.findIndex(u => u.email === s.email);
      if (idx >= 0) {
        users[idx] = Object.assign({}, users[idx], { name: name });
        saveUsers(users);
      }

      const nextSession = Object.assign({}, s, { name: name });
      localStorage.setItem('fm_session', JSON.stringify(nextSession));

      saveExtra(s.email, { phone: phone, birth: birth, address: address });

      setEditable(false);
      alert(tr('updateSuccess'));
    }

    window.startEdit = startEdit;
    window.cancelEdit = cancelEdit;
    window.saveProfile = saveProfile;

    (async function init() {
      await loadLayouts();
      fillForm();
      setEditable(false);
      applyLanguage();
      document.getElementById('lang-select').addEventListener('change', (e) => setLanguage(e.target.value));
    })();
  </script>
</body>
</html>
