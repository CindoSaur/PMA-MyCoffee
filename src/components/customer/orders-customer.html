<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Others - Customer</title>
  <link rel="stylesheet" href="/style/style.css" />
  <style>
    .page { display: flex; min-height: 100vh; background: var(--bg); }
    .main { flex: 1; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .topbar h1 { margin: 0; font-family: var(--serif); font-size: 26px; }
    .lang-switch { border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; padding: 7px 10px; font-size: 13px; color: var(--text); }
    .content { padding: 24px; max-width: 1120px; }

    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .tab {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      color: var(--text-mid);
      font-size: 13px;
    }
    .tab.active { border-color: var(--green); background: #e9fbf3; color: var(--green-dark); }

    .list { display: grid; gap: 10px; }
    .order {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .id { font-weight: 700; color: var(--text); }
    .status { font-size: 12px; padding: 4px 10px; border-radius: 999px; }
    .st-pending { background: #fff7ed; color: #9a3412; }
    .st-completed { background: #ecfdf5; color: #065f46; }
    .st-cancelled { background: #fef2f2; color: #991b1b; }
    .meta { font-size: 12px; color: var(--text-light); margin-top: 6px; }
    .items { font-size: 13px; color: var(--text-mid); margin-top: 8px; }
    .note {
      width: 100%;
      margin-top: 8px;
      min-height: 66px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      font-family: var(--sans);
    }
    .save { margin-top: 8px; border: 1px solid var(--green); background: #1d9e75; color: #fff; border-radius: var(--radius-sm); padding: 8px 10px; cursor: pointer; }

    .empty { background: #fff; border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; color: var(--text-mid); }
  </style>
</head>
<body>
  <div class="page">
    <div id="sidebar-slot"></div>
    <main class="main">
      <div class="topbar">
        <h1 id="page-title">Others</h1>
        <select id="lang-select" class="lang-switch" aria-label="Language">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
      <div class="content">
        <div class="tabs" id="tabs"></div>
        <div id="list" class="list"></div>
        <div id="empty" class="empty" style="display:none;">No orders in this filter.</div>
      </div>
    </main>
  </div>

  <div id="footer-slot"></div>

  <script>
    const I18N = {
      en: {
        pageTitle: 'Others', all: 'All', pending: 'Pending', completed: 'Completed', cancelled: 'Cancelled',
        noOrders: 'No orders in this filter.', noteSaved: 'Note saved',
        order: 'Order', total: 'Total', date: 'Date', noItem: 'No item data',
        notePlaceholder: 'Your private note for this order...', saveNote: 'Save note', currency: 'VND'
      },
      vi: {
        pageTitle: 'Khác', all: 'Tất cả', pending: 'Đang xử lý', completed: 'Hoàn tất', cancelled: 'Đã hủy',
        noOrders: 'Không có đơn nào theo bộ lọc này.', noteSaved: 'Đã lưu ghi chú',
        order: 'Đơn', total: 'Tổng tiền', date: 'Ngày', noItem: 'Không có dữ liệu món',
        notePlaceholder: 'Ghi chú riêng cho đơn hàng này...', saveNote: 'Lưu ghi chú', currency: 'VND'
      }
    };
    let currentLang = localStorage.getItem('fm_lang') || ((navigator.language || '').toLowerCase().startsWith('vi') ? 'vi' : 'en');
    function tr(k) { return (I18N[currentLang] && I18N[currentLang][k]) || I18N.en[k] || k; }

    function getSession() { return JSON.parse(localStorage.getItem('fm_session') || 'null'); }
    function getOrders() { return JSON.parse(localStorage.getItem('fm_orders') || '[]'); }

    function getNotesKey(email) { return 'fm_order_notes_' + String(email || 'guest'); }
    function getNotes(email) { return JSON.parse(localStorage.getItem(getNotesKey(email)) || '{}'); }
    function saveNotes(email, data) { localStorage.setItem(getNotesKey(email), JSON.stringify(data)); }

    function loadSidebarFallback() {
      document.getElementById('sidebar-slot').innerHTML = '<aside style="width:220px;background:#fff;border-right:1px solid var(--border);padding:14px;">'
        + '<div style="font-weight:700;margin-bottom:10px;">MyCoffee</div>'
        + '<a href="/components/customer/dashboard-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Dashboard</a>'
        + '<a href="/components/customer/products-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Menu</a>'
        + '<a href="/components/customer/voucher-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">Vouchers</a>'
        + '<a href="/components/customer/orders-customer.html" style="display:block;margin:8px 0;color:var(--green-dark);text-decoration:none;">Others</a>'
        + '<a href="/components/customer/setting-customer.html" style="display:block;margin:8px 0;text-decoration:none;color:var(--text-mid);">My Profile</a>'
        + '</aside>';
    }

    async function loadLayouts() {
      try {
        const sb = await fetch('/components/layout/sidebar-customer.html');
        if (sb.ok) document.getElementById('sidebar-slot').innerHTML = await sb.text();
        else loadSidebarFallback();
      } catch (e) { loadSidebarFallback(); }

      try {
        const ft = await fetch('/components/layout/footer.html');
        if (ft.ok) document.getElementById('footer-slot').innerHTML = await ft.text();
      } catch (e) {}
    }

    function statusClass(s) {
      const k = String(s || '').toLowerCase();
      if (k.includes('deliver') || k.includes('complete') || k.includes('done')) return 'st-completed';
      if (k.includes('cancel')) return 'st-cancelled';
      return 'st-pending';
    }

    const FILTERS = [
      { key: 'all' },
      { key: 'pending' },
      { key: 'completed' },
      { key: 'cancelled' }
    ];
    let active = 'All';

    function normalizeFilterName(key) {
      if (key === 'all') return 'All';
      if (key === 'pending') return 'Pending';
      if (key === 'completed') return 'Completed';
      return 'Cancelled';
    }

    function filterByStatus(order) {
      const st = String(order.status || '').toLowerCase();
      if (active === 'All') return true;
      if (active === 'Pending') return !(st.includes('deliver') || st.includes('complete') || st.includes('done') || st.includes('cancel'));
      if (active === 'Completed') return st.includes('deliver') || st.includes('complete') || st.includes('done');
      if (active === 'Cancelled') return st.includes('cancel');
      return true;
    }

    function renderTabs() {
      const wrap = document.getElementById('tabs');
      wrap.innerHTML = FILTERS.map(f => {
        const name = normalizeFilterName(f.key);
        return '<button class="tab ' + (name === active ? 'active' : '') + '" data-f="' + name + '">' + tr(f.key) + '</button>';
      }).join('');
      wrap.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          active = btn.getAttribute('data-f') || 'All';
          render();
        });
      });
    }

    function saveNote(orderId) {
      const s = getSession();
      if (!s) return;
      const email = s.email || 'guest';
      const notes = getNotes(email);
      const val = document.getElementById('note-' + orderId).value;
      notes[String(orderId)] = val;
      saveNotes(email, notes);
      alert(tr('noteSaved'));
    }

    function render() {
      const s = getSession();
      if (!s) {
        location.href = '/components/auth/login.html';
        return;
      }

      const email = s.email || 'guest';
      const notes = getNotes(email);
      const orders = getOrders()
        .filter(o => o && (o.customerEmail === s.email || o.customer === s.name))
        .filter(filterByStatus)
        .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      if (!orders.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = orders.map(o => {
        const items = (o.items || []).map(i => (i.name || 'Item') + ' x' + Number(i.qty || 1)).join(', ');
        const date = o.date ? new Date(o.date).toLocaleString('vi-VN') : '-';
        const note = notes[String(o.id)] || '';
        return '<article class="order">'
          + '<div class="row"><div class="id">' + tr('order') + ' #' + o.id + '</div><div class="status ' + statusClass(o.status) + '">' + (o.status || tr('pending')) + '</div></div>'
          + '<div class="meta">' + tr('total') + ': ' + new Intl.NumberFormat(currentLang === 'vi' ? 'vi-VN' : 'en-US').format(Number(o.total || 0)) + ' ' + tr('currency') + ' | ' + tr('date') + ': ' + date + '</div>'
          + '<div class="items">' + (items || tr('noItem')) + '</div>'
          + '<textarea id="note-' + o.id + '" class="note" placeholder="' + tr('notePlaceholder') + '">' + note + '</textarea>'
          + '<button class="save" onclick="saveNote(' + o.id + ')">' + tr('saveNote') + '</button>'
          + '</article>';
      }).join('');
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.getElementById('lang-select').value = currentLang;
      document.getElementById('page-title').textContent = tr('pageTitle');
      document.getElementById('empty').textContent = tr('noOrders');
      renderTabs();
    }

    function setLanguage(lang) {
      currentLang = (lang === 'vi') ? 'vi' : 'en';
      localStorage.setItem('fm_lang', currentLang);
      applyLanguage();
      render();
    }

    window.saveNote = saveNote;

    (async function init() {
      await loadLayouts();
      applyLanguage();
      render();
      document.getElementById('lang-select').addEventListener('change', (e) => setLanguage(e.target.value));
    })();
  </script>
</body>
</html>
