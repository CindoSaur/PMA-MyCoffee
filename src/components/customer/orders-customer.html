<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>My Orders — Fresh Market</title>
	<link rel="stylesheet" href="/style/style.css" />
	<style>
		.container{max-width:1100px;margin:0 auto;padding:3rem 2.5rem}
		.sec-title{font-family:var(--serif);font-size:28px;margin-bottom:6px}
		table{width:100%;border-collapse:collapse}
		thead th{padding:10px;text-align:left;color:var(--text-light);font-size:12px;border-bottom:1px solid var(--border)}
		tbody td{padding:12px;border-bottom:1px solid rgba(0,0,0,.04)}
		.empty{padding:3rem;text-align:center;color:var(--text-light)}
	</style>
</head>
<body>
<div style="display:flex;min-height:100vh">
	<div id="sidebar-slot"></div>
	<div class="dash-main">
		<div class="dash-topbar"><div class="dash-title">My Orders</div></div>
		<div class="dash-content">

			<div class="container">
	<div class="section-label">Orders</div>
	<div class="sec-title">My Orders</div>
	<div class="sec-sub">Track your orders and view details.</div>

	<div class="table-card" style="margin-top:18px">
		<div class="table-wrap">
			<table>
				<thead><tr><th>Order</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
				<tbody id="orders-tbody"></tbody>
			</table>
			<div id="empty" class="empty" style="display:none">You have no orders yet.</div>
		</div>
	</div>

			</div>

		</div>
	</div>
</div>

<div id="footer-slot"></div>

<script>
async function loadComponent(slot, url){ try{ const r=await fetch(url); if(!r.ok) throw 0; document.getElementById(slot).innerHTML=await r.text(); }catch(e){console.warn('load failed',url);} }
loadComponent('footer-slot','/components/layout/footer.html');

// load the customer sidebar with fallback for Tauri
window.addEventListener('DOMContentLoaded', async ()=>{
	const sidebarSlot = document.getElementById('sidebar-slot');
	let sidebarLoaded = false;
	try{
		const res = await fetch('/components/layout/sidebar-customer.html');
		if(res.ok){
			const content = await res.text();
			if(content.trim()){
				sidebarSlot.innerHTML = content;
				sidebarLoaded = true;
			}
		}
	}catch(e){
		console.warn('Sidebar fetch failed, using fallback');
	}

	// If fetch failed or returned nothing, use fallback
	if(!sidebarLoaded || !sidebarSlot.innerHTML.trim()){
		sidebarSlot.innerHTML = `<aside class="sidebar" style="width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;padding:0">
		  <div style="padding:1.4rem 1.25rem 1rem;font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)">
		    <span class="mi" style="font-size:16px;color:#1d9e75;margin-right:8px">local_drink</span>Fresh Market
		  </div>
		  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase">Overview</div>
		  <a href="/components/customer/dashboard-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">dashboard</span> Dashboard</a>
		  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:1rem">Shop</div>
		  <a href="/components/customer/products-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">inventory_2</span> Menu</a>
		  <a href="/components/customer/voucher-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">local_offer</span> Vouchers</a>
		  <a href="/components/customer/orders-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:#1d9e75;text-decoration:none;cursor:pointer;font-weight:500"><span class="mi">receipt_long</span> Orders</a>
		  <div style="padding:.75rem 1rem .25rem;font-size:10px;letter-spacing:.1em;color:var(--text-light);text-transform:uppercase;margin-top:1rem">Account</div>
		  <a href="/components/customer/user-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">person</span> My Profile</a>
		  <a href="/components/customer/setting-customer.html" style="display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:var(--text-mid);text-decoration:none;cursor:pointer"><span class="mi">settings</span> Settings</a>
		  <div style="margin-top:auto;padding:1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">
		    <div id="sb-avatar" style="width:36px;height:36px;border-radius:50%;background:#1d9e75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600">—</div>
		    <div style="flex:1;min-width:0">
		      <div id="sb-name" style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
		      <div id="sb-role" style="font-size:10px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">customer</div>
		    </div>
		  </div>
		</aside>`;
	}

	const s = JSON.parse(localStorage.getItem('fm_session')||'null');
	if(s){
		const nameEl = document.getElementById('sb-name');
		const roleEl = document.getElementById('sb-role');
		const avatar = document.getElementById('sb-avatar');
		if(nameEl) nameEl.textContent = s.name;
		if(roleEl) roleEl.textContent = s.role||'customer';
		if(avatar) avatar.textContent = s.name.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase();
	}

	try{ render(); }catch(e){ console.warn('render error',e); }
})();

function getOrders(){ return JSON.parse(localStorage.getItem('fm_orders')||'[]'); }
function getSession(){ return JSON.parse(localStorage.getItem('fm_session')||'null'); }

function fmtMoney(v){ if(!v) return '₫0'; if(v>=1000000) return '₫'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return '₫'+(v/1000).toFixed(0)+'K'; return '₫'+v.toFixed(0); }

function render(){ const s=getSession(); if(!s){ document.getElementById('orders-tbody').innerHTML=''; document.getElementById('empty').style.display='block'; return; } const all=getOrders().filter(o=>o.customerEmail===s.email||o.customer===s.name).sort((a,b)=>new Date(b.date)-new Date(a.date)); const tbody=document.getElementById('orders-tbody'); if(!all.length){ tbody.innerHTML=''; document.getElementById('empty').style.display='block'; return;} document.getElementById('empty').style.display='none'; tbody.innerHTML = all.map(o=>{ const items = (o.items||[]).map(i=>i.name+(i.qty>1?' x'+i.qty:'')) .join(', '); const d=new Date(o.date||''); const date = isNaN(d)?'—':d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); return `<tr><td>#${o.id}</td><td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${items}</td><td style="font-weight:600">${fmtMoney(o.total)}</td><td>${(o.status||'—')}</td><td>${date}</td></tr>`; }).join(''); }

window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
